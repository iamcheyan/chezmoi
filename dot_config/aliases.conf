# =============================================================================
# yazi.conf
# =============================================================================

y() {
  local tmp cwd
  tmp="$(mktemp -t yazi-cwd.XXXXXX)"

  if [[ $# -gt 0 ]]; then
    command yazi --cwd-file="$tmp" "$@"
  else
    command yazi --cwd-file="$tmp"
  fi

  if [ -f "$tmp" ]; then
    cwd="$(cat "$tmp")"
    [ -n "$cwd" ] && [ -d "$cwd" ] && cd "$cwd"
    rm -f "$tmp"
  fi
}

# =============================================================================
# z.conf
# =============================================================================

zz() {
  local base dir query selected
  local -a list_cmd
  local white gray slate reset
  white=$'\033[37m'
  gray=$'\033[90m'
  slate=$'\033[38;5;67m'
  reset=$'\033[0m'
  base="$HOME"
  query=""

  if [[ $# -gt 0 ]]; then
    if [[ "$1" == "." ]]; then
      base="$PWD"
      shift
    elif [[ "$1" == "~" ]]; then
      base="$HOME"
      shift
    elif [[ "$1" == ~/* ]]; then
      base="${HOME}/${1#~/}"
      shift
    elif [[ -d "$1" ]]; then
      base="$1"
      shift
    fi
  fi

  if [[ $# -gt 0 ]]; then
    query="$*"
  fi

  if [[ ! -d "$base" ]]; then
    echo "zz: not a directory: $base" >&2
    return 1
  fi

  if command -v fd >/dev/null 2>&1; then
    list_cmd=(fd . "$base" --type d --hidden --follow --exclude .git)
  elif command -v fdfind >/dev/null 2>&1; then
    list_cmd=(fdfind . "$base" --type d --hidden --follow --exclude .git)
  else
    list_cmd=(find "$base" -type d)
  fi

  selected=$(
    {
      if [[ "$base" == "$HOME" ]]; then
        zoxide query -l 2>/dev/null | awk -v color="$white" -v reset="$reset" 'NF { printf "0\t%s%s%s\t%s\n", color, $0, reset, $0 }'
      fi
      printf '1\t%s%s%s\t%s\n' "$gray" "$base" "$reset" "$base"
      "${list_cmd[@]}" 2>/dev/null | awk -v source="${list_cmd[0]}" -v color="$slate" -v reset="$reset" '
        NF {
          printf "2\t%s%s%s\t%s\n", color, $0, reset, $0
        }
      '
    } | awk -F '\t' 'NF >= 3 && !seen[$3]++ { print $1 "\t" $2 "\t" $3 }' | fzf \
      --ansi \
      --reverse \
      --no-sort \
      --prompt="dirs> " \
      --query "$query" \
      --delimiter=$'\t' \
      --with-nth=2 \
      --preview 'ls -F --color=always {3} 2>/dev/null' \
      --preview-window=right:40%
  )
  [[ -z "$selected" ]] && return 0

  dir="${selected##*$'\t'}"
  [[ -n "$dir" ]] && cd "$dir"
}

