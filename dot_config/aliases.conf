# =============================================================================
# init.conf
# =============================================================================

# Kiro CLI
[[ -f "${HOME}/.local/share/kiro-cli/shell/zshrc.pre.zsh" ]] && builtin source "${HOME}/.local/share/kiro-cli/shell/zshrc.pre.zsh"

# Kitty tab 颜色：SSH 会话红色，本地恢复默认
if [[ -n "$SSH_CONNECTION" || -n "$SSH_CLIENT" || -n "$SSH_TTY" ]]; then
    if [[ -n "$KITTY_WINDOW_ID" ]]; then
        (kitty @ --to unix:/tmp/mykitty set-tab-color active_bg=rgb(8b0000) inactive_bg=rgb(3a0000) >/dev/null 2>&1 &) >/dev/null 2>&1
    fi
else
    if [[ -n "$KITTY_WINDOW_ID" ]]; then
        (kitty @ --to unix:/tmp/mykitty set-tab-color active_bg=default inactive_bg=default >/dev/null 2>&1 &) >/dev/null 2>&1
    fi
fi

# GO
export GOENV_ROOT="$HOME/.goenv"
export PATH="$GOENV_ROOT/shims:$GOENV_ROOT/bin:$PATH"
if command -v goenv >/dev/null 2>&1; then
  eval "$(goenv init -)"
fi

# bun
[ -s "$HOME/bun/_bun" ] && source "$HOME/bun/_bun"
export BUN_INSTALL="$HOME/.bun"
export PATH="$BUN_INSTALL/bin:$PATH"

# Android SDK
export ANDROID_HOME=$HOME/Android/Sdk
export ANDROID_SDK_ROOT=$HOME/Android/Sdk
export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/build-tools/33.0.2

# grok
export PATH="$HOME/.grok/bin:$PATH"
fpath=(~/.grok/completions/zsh $fpath)
autoload -Uz compinit && compinit -C

# AWS aliases
[[ -f ~/.aws/aliases.conf ]] && source ~/.aws/aliases.conf

# =============================================================================
# a.conf
# =============================================================================

export PATH="$HOME/.opencode/bin:$PATH"

# Pyenv
export PYENV_ROOT="$HOME/.pyenv"
if [ -d "$PYENV_ROOT" ]; then
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)" 2>/dev/null
fi

# Config Management (Chezmoi & Dotfiles)
alias eaa="nvim $HOME/chezmoi/dot_config/aliases.conf"
alias eaz="nvim $HOME/chezmoi/dot_config/dotfiles/aliases.conf"

# 确保 dotfiles 里能访问 chezmoi 配置
[[ ! -e "$HOME/dotfiles/chezmoi" && -d "$HOME/chezmoi" ]] && ln -s "$HOME/chezmoi" "$HOME/dotfiles/chezmoi"
# 确保 chezmoi 里能访问 .config（浏览 chezmoi 生成的配置文件）
[[ ! -e "$HOME/chezmoi/config" && -d "$HOME/.config" ]] && ln -s "$HOME/.config" "$HOME/chezmoi/config"

# OpenCode REPL
if [[ "$OSTYPE" == "darwin"* ]]; then
    if [[ -f "$HOME/Development/oc/fork/dist/opencode-darwin-arm64/bin/opencode-minimal" ]]; then
        _OC_BIN="$HOME/Development/oc/fork/dist/opencode-darwin-arm64/bin/opencode-minimal"
    elif [[ -f "$HOME/Development/oc/fork/dist/opencode-darwin-arm64/bin/opencode-vim" ]]; then
        _OC_BIN="$HOME/Development/oc/fork/dist/opencode-darwin-arm64/bin/opencode-vim"
    fi
else
    if [[ -f "$HOME/Development/oc/fork/dist/opencode-linux-x64/bin/opencode-minimal" ]]; then
        _OC_BIN="$HOME/Development/oc/fork/dist/opencode-linux-x64/bin/opencode-minimal"
    elif [[ -f "$HOME/Development/oc/fork/dist/opencode-linux-x64/bin/opencode-vim" ]]; then
        _OC_BIN="$HOME/Development/oc/fork/dist/opencode-linux-x64/bin/opencode-vim"
    fi
fi

if [[ -n "${_OC_BIN:-}" ]] && [[ -x "$_OC_BIN" ]]; then
    alias oc="$_OC_BIN"
    alias occ="$_OC_BIN --continue"
    alias ocr="$_OC_BIN --resume"
    alias oc-build="bash $HOME/Development/oc/fork/build.sh"
else
    oc() { realpath "$HOME/dotfiles/agent/opencode.json"; }
    occ() { realpath "$HOME/dotfiles/agent/opencode.json"; }
    ocr() { realpath "$HOME/dotfiles/agent/opencode.json"; }
fi

# Pi (Fork)
PI_ROOT="${PI_REPO:-$HOME/Development/pi}"

if [[ -f "$PI_ROOT/packages/coding-agent/dist/pi" ]]; then
    PI_BIN="$PI_ROOT/packages/coding-agent/dist/pi"
elif [[ "$OSTYPE" == "darwin"* ]]; then
    PI_BIN="$PI_ROOT/fork/dist/pi-darwin-arm64/bin/pi"
else
    PI_BIN="$PI_ROOT/fork/dist/pi-linux-x64/bin/pi"
fi

# Fallback to ~/.local/bin/pi (installed by curl remote mode)
[[ ! -x "$PI_BIN" ]] && PI_BIN="$HOME/.pi/bin/pi"

# Extensions auto-load from ~/.pi/agent/extensions/ (installed by fork/init.sh)
alias pi="$PI_BIN"
alias pi-build='bash "$PI_ROOT/fork/build.sh"'
alias pi-install='bash "$PI_ROOT/fork/init.sh"'

# General Utilities & Tools
alias pat="bash $HOME/chezmoi/dot_config/dotfiles/scripts/pat.sh"
alias fy="python $HOME/dotfiles/scripts/translate/translate.py"
alias zdy='nvim +"normal! GA" "${HOME}/dotfiles/rime/sbzr.chrome.extension/dicts/zdy.dict.yaml"'

#android emulator
alias miyako-emulator="bash $HOME/.config/scripts/miyako-emulator.sh"
alias miyako-emu="miyako-emulator open"
alias miyako-install="miyako-emulator install"

# =============================================================================
# git.conf
# =============================================================================

unalias gc 2>/dev/null
gc() {
  if [ -z "$1" ]; then
    echo "Usage: gc -m \"commit message\""
    return 1
  fi

  git add .

  git commit "$@"
}

dp() {
  echo "🧠 push dotfiles..."
  bash ${HOME}/dotfiles/scripts/dev/push_dotfiles.sh

  if [ -d "${HOME}/chezmoi/.git" ]; then
    echo "🔐 push chezmoi..."
    git -C "${HOME}/chezmoi" add -A
    git -C "${HOME}/chezmoi" commit -m "update" >/dev/null 2>&1 || true
    git -C "${HOME}/chezmoi" push
  fi
}

alias easygit="bash ${HOME}/dotfiles/tools/easygit.sh"
alias lg="lazygit"
alias gstsh="git status --short"
alias gpat="bash $HOME/dotfiles/rime/pat.sh"
alias ga="git add -A"
alias gu="git reset HEAD"
alias gw="git stash"
alias gp="git stash pop"
alias gs="git status -s"
alias gui="gitui"
git:ui() { command gitui "$@"; }
git:delta:init() {
    if ! command -v delta >/dev/null 2>&1; then echo "delta 未安装"; return 1; fi
    git config --global core.pager delta
    git config --global interactive.diffFilter 'delta --color-only'
    git config --global delta.navigate true
    git config --global delta.side-by-side true
    echo "✓ 已启用 delta"
}
git:diff() { command git diff "$@"; }
git:init() { easygit init "$@"; }

