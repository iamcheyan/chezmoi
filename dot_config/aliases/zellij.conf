# ⚠️ CHEZMOI-managed — edit source only: ~/chezmoi/dot_config/aliases/zellij.conf
# After editing, run: chezmoi apply
alias ze="zellij"
zea() {
  echo "🧠 zellij attach -c -f：Attach or create a new session (force full screen)"
  zellij attach -c -f "$@"
}
zem() {
  # 修复 Ghostty 终端兼容性（zellij 0.43.1 对 xterm-ghostty 会 panic）
  if [[ "$TERM" == "xterm-ghostty" ]]; then
    export TERM=xterm-256color
  fi

  # 禁止在 zellij 内部嵌套执行
  if [[ -n "$ZELLIJ" ]]; then
    echo "⚠️  Cannot run 'zem' inside a zellij session! Already in: ${ZELLIJ_SESSION_NAME:-zellij}"
    echo "   Use 'Ctrl+o d' to detach first."
    return 1
  fi

  local session="main"
  if [[ -n "$SSH_CONNECTION" || -n "$SSH_CLIENT" || -n "$SSH_TTY" ]]; then
    session="ssh"
  fi

  local zellij_bin
  zellij_bin="$(command -v zellij)"

  # 处理已存在的会话：活着就 attach，死了就删掉重建
  local existing
  existing=$(timeout 2 "$zellij_bin" ls --no-formatting 2>/dev/null | awk -v s="$session" '$1 == s {print; exit}')

  if [[ -n "$existing" ]]; then
    if [[ "$existing" == *"(EXITED"* ]]; then
      "$zellij_bin" delete-session "$session" --force 2>/dev/null
    else
      "$zellij_bin" attach "$session"
      return
    fi
  fi

  # 创建新会话
  if [[ "$session" == "ssh" ]]; then
    local tmpdir=$(mktemp -d)
    cat > "$tmpdir/config.kdl" <<'EOF'
themes {
    mytheme {
        fg "#c0caf5"
        bg "#1a1b26"
        black "#1a1b26"
        red "#f7768e"
        green "#9ece6a"
        yellow "#e0af68"
        blue "#7aa2f7"
        magenta "#bb9af7"
        cyan "#7dcfff"
        white "#c0caf5"
        orange "#ff9e64"
    }
}
theme "mytheme"
keybindings {
    session {
        bind "Ctrl o" { SwitchToMode "Normal"; }
        bind "d" { Detach; }
        bind "x" { Quit; }
    }
}
EOF
    "$zellij_bin" --config-dir "$tmpdir" --session "$session"
  else
    "$zellij_bin" --session "$session" --new-session-with-layout default
  fi
}
# 原生 zellij：不加载任何自定义配置，只加主题和 session 模式按键
zjn() {
  local tmpdir=$(mktemp -d)
  cat > "$tmpdir/config.kdl" <<'EOF'
themes {
    mytheme {
        fg "#c0caf5"
        bg "#1a1b26"
        black "#1a1b26"
        red "#f7768e"
        green "#9ece6a"
        yellow "#e0af68"
        blue "#7aa2f7"
        magenta "#bb9af7"
        cyan "#7dcfff"
        white "#c0caf5"
        orange "#ff9e64"
    }
}
theme "mytheme"
keybindings {
    session {
        bind "Ctrl o" { SwitchToMode "Normal"; }
        bind "d" { Detach; }
        bind "x" { Quit; }
    }
}
EOF
  zellij --config-dir "$tmpdir" "$@"
}
alias zec="zellij attach -c -f "
alias zetmp="zellij attach -c -f tmp options --default-layout compact"
alias zedefault="zellij -l default"
alias zecompact="zellij -l compact"
alias zeclassic="zellij -l classic"
zeclear() {
    local zellij_bin timeout_bin
    zellij_bin="$(command -v zellij)" || {
        echo "❌ zellij not found."
        return 1
    }
    timeout_bin="$(command -v timeout || command -v gtimeout || true)"

    _zeclear_timeout() {
        local seconds="$1"
        shift
        if [[ -n "$timeout_bin" ]]; then
            "$timeout_bin" "$seconds" "$@"
        else
            "$@"
        fi
    }

    echo "🧹 Force repairing zellij..."
    echo "  stopping zellij processes..."
    pkill -u "$USER" -x zellij 2>/dev/null || true
    sleep 0.5
    pkill -9 -u "$USER" -x zellij 2>/dev/null || true

    echo "  deleting zellij sessions..."
    _zeclear_timeout 5 "$zellij_bin" delete-all-sessions --yes --force >/dev/null 2>&1 || true

    echo "  clearing resurrect cache..."
    rm -rf "$HOME/Library/Caches/org.Zellij-Contributors.Zellij"/*/session_info 2>/dev/null || true
    rm -rf "${TMPDIR%/}/zellij-$(id -u)" 2>/dev/null || true

    if _zeclear_timeout 2 "$zellij_bin" ls --no-formatting >/dev/null 2>&1; then
        echo "✅ zellij command is responsive."
    else
        echo "⚠️  zellij still looks unresponsive."
        return 1
    fi

    echo "✅ zellij repaired and cleaned."
}
