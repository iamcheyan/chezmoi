# ⚠️ CHEZMOI-managed — edit source only: ~/chezmoi/dot_config/aliases/zellij.conf
# After editing, run: chezmoi apply
alias ze="zellij"
zea() {
  echo "🧠 zellij attach -c -f：Attach or create a new session (force full screen)"
  zellij attach -c -f "$@"
}
zem() {
  # 禁止在 zellij 内部嵌套执行
  if [[ -n "$ZELLIJ" ]]; then
    echo "⚠️  Cannot run 'zem' inside a zellij session! Already in: ${ZELLIJ_SESSION_NAME:-zellij}"
    echo "   Use 'Ctrl+o d' to detach first."
    return 1
  fi

  local session="main"
  if [[ -n "$SSH_CONNECTION" || -n "$SSH_CLIENT" || -n "$SSH_TTY" ]]; then
    session="ssh"
  fi

  # 处理已存在的会话：活着就 attach，死了就删掉重建
  local existing
  existing=$(zellij ls 2>/dev/null | sed -E 's/\x1B\[[0-9;]*[[:alpha:]]//g' | awk -v s="$session" '$1 == s {print $2}')

  if [[ -n "$existing" ]]; then
    if [[ "$existing" == "(EXITED)" ]]; then
      zellij delete-session "$session" 2>/dev/null
    else
      zellij attach "$session"
      return
    fi
  fi

  # 创建新会话
  if [[ "$session" == "ssh" ]]; then
    local tmpdir=$(mktemp -d)
    zellij --config-dir "$tmpdir" --session "$session"
  else
    zellij attach --create "$session"
  fi
}
# 原生 zellij：不加载任何自定义配置
zjn() {
  local tmpdir=$(mktemp -d)
  zellij --config-dir "$tmpdir" "$@"
}
alias zec="zellij attach -c -f "
alias zetmp="zellij attach -c -f tmp options --default-layout compact"
alias zedefault="zellij -l default"
alias zecompact="zellij -l compact"
alias zeclassic="zellij -l classic"
zeclear() {
    # 在 zellij 内部禁止执行，防止误杀当前会话
    if [[ -n "$ZELLIJ" ]]; then
        echo "⚠️  Cannot run 'zeclear' inside a zellij session!"
        echo "   This would kill the session you're currently in."
        echo "   Please detach first: Ctrl+o d"
        return 1
    fi

    echo "🧹 Cleaning up EXITED zellij sessions..."
    
    # 使用 timeout 防止 zellij ls 卡住终端，超时设为 2 秒
    local sessions
    if ! sessions=$(timeout 2 zellij ls 2>/dev/null); then
        echo "⚠️  Zellij server is unresponsive (timeout) or no sessions exist."
    else
        # 移除了 ANSI 颜色字符并提取 EXITED 状态的会话名
        local exited_sessions
        exited_sessions=$(echo "$sessions" | sed -E 's/\x1B\[[0-9;]*[[:alpha:]]//g' | awk '/EXITED/ {print $1}')
        
        if [ -n "$exited_sessions" ]; then
            echo "Found exited sessions:"
            echo "$exited_sessions"
            echo "$exited_sessions" | xargs -r -I {} zellij delete-session "{}"
            echo "✅ Exited sessions cleared."
        else
            echo "✨ No EXITED sessions found."
        fi
    fi

    # 询问用户是否强杀所有 Zellij 进程（清理残留）
    echo -n "❓ Do you want to force kill all Zellij processes? (y/N): "
    read -r response
    if [[ "$response" =~ ^[Yy]$ ]]; then
        echo "💥 Force killing all Zellij processes..."
        killall -9 zellij 2>/dev/null
        echo "✅ All Zellij processes killed."
    else
        echo "Skip force killing."
    fi
}


