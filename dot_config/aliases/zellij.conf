# ⚠️ CHEZMOI-managed — edit source only: ~/chezmoi/dot_config/aliases/zellij.conf
# After editing, run: chezmoi apply
alias ze="zellij"
zea() {
  echo "🧠 zellij attach -c -f：Attach or create a new session (force full screen)"
  zellij attach -c -f "$@"
}
zem() {
  # 禁止在 zellij 内部嵌套执行
  if [[ -n "$ZELLIJ" ]]; then
    echo "⚠️  Cannot run 'zem' inside a zellij session! Already in: ${ZELLIJ_SESSION_NAME:-zellij}"
    echo "   Use 'Ctrl+o d' to detach first."
    return 1
  fi

  local session="main"
  if [[ -n "$SSH_CONNECTION" || -n "$SSH_CLIENT" || -n "$SSH_TTY" ]]; then
    session="ssh"
  fi

  # 处理已存在的会话：活着就 attach，死了就删掉重建
  local existing
  existing=$(zellij ls 2>/dev/null | sed -E 's/\x1B\[[0-9;]*[[:alpha:]]//g' | awk -v s="$session" '$1 == s {print $2}')

  if [[ -n "$existing" ]]; then
    if [[ "$existing" == "(EXITED)" ]]; then
      zellij delete-session "$session" 2>/dev/null
    else
      zellij attach "$session"
      return
    fi
  fi

  # 创建新会话
  if [[ "$session" == "ssh" ]]; then
    local tmpdir=$(mktemp -d)
    cat > "$tmpdir/config.kdl" <<'EOF'
themes {
    mytheme {
        fg "#c0caf5"
        bg "#1a1b26"
        black "#1a1b26"
        red "#f7768e"
        green "#9ece6a"
        yellow "#e0af68"
        blue "#7aa2f7"
        magenta "#bb9af7"
        cyan "#7dcfff"
        white "#c0caf5"
        orange "#ff9e64"
    }
}
theme "mytheme"
keybindings {
    session {
        bind "Ctrl o" { SwitchToMode "Normal"; }
        bind "d" { Detach; }
        bind "x" { Quit; }
    }
}
EOF
    zellij --config-dir "$tmpdir" --session "$session"
  else
    zellij attach --create "$session"
  fi
}
# 原生 zellij：不加载任何自定义配置，只加主题和 session 模式按键
zjn() {
  local tmpdir=$(mktemp -d)
  cat > "$tmpdir/config.kdl" <<'EOF'
themes {
    mytheme {
        fg "#c0caf5"
        bg "#1a1b26"
        black "#1a1b26"
        red "#f7768e"
        green "#9ece6a"
        yellow "#e0af68"
        blue "#7aa2f7"
        magenta "#bb9af7"
        cyan "#7dcfff"
        white "#c0caf5"
        orange "#ff9e64"
    }
}
theme "mytheme"
keybindings {
    session {
        bind "Ctrl o" { SwitchToMode "Normal"; }
        bind "d" { Detach; }
        bind "x" { Quit; }
    }
}
EOF
  zellij --config-dir "$tmpdir" "$@"
}
alias zec="zellij attach -c -f "
alias zetmp="zellij attach -c -f tmp options --default-layout compact"
alias zedefault="zellij -l default"
alias zecompact="zellij -l compact"
alias zeclassic="zellij -l classic"
zeclear() {
    local current_session="${ZELLIJ_SESSION_NAME:-}"
    local in_zellij=false
    [[ -n "$ZELLIJ" ]] && in_zellij=true

    echo "🧹 Cleaning up EXITED zellij sessions..."

    # 使用 timeout 防止 zellij ls 卡住终端，超时设为 2 秒
    local sessions
    if ! sessions=$(timeout 2 zellij ls 2>/dev/null); then
        echo "⚠️  Zellij server is unresponsive (timeout) or no sessions exist."
        return 1
    fi

    # 移除 ANSI 颜色字符并提取 EXITED 状态的会话名
    local exited_sessions
    exited_sessions=$(echo "$sessions" | sed -E 's/\x1B\[[0-9;]*[[:alpha:]]//g' | awk '/EXITED/ {print $1}')

    if [[ -z "$exited_sessions" ]]; then
        echo "✨ No EXITED sessions found."
        return 0
    fi

    # 如果在 zellij 内部，过滤掉当前 session 和所有活跃 session
    local to_clean
    if $in_zellij; then
        # 获取所有活跃（非 EXITED）的 session 名
        local active_sessions
        active_sessions=$(echo "$sessions" | sed -E 's/\x1B\[[0-9;]*[[:alpha:]]//g' | awk '!/EXITED/ {print $1}' | grep -v "^$" || true)
        # 合并：当前 session + 活跃 session 都不清理
        local skip_sessions
        skip_sessions=$(echo -e "${current_session}\n${active_sessions}" | sort -u | grep -v "^$" || true)
        to_clean=$(echo "$exited_sessions" | grep -vxF -f <(echo "$skip_sessions") || true)
        echo "ℹ️  Skipping active sessions: $(echo "$skip_sessions" | tr '\n' ' ')"
    else
        to_clean="$exited_sessions"
    fi

    if [[ -z "$to_clean" ]]; then
        echo "✨ No other EXITED sessions to clean."
        return 0
    fi

    echo "Found exited sessions:"
    echo "$to_clean"
    echo "$to_clean" | xargs -r -I {} zellij delete-session "{}"
    echo "✅ Exited sessions cleared."
}


