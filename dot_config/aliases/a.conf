# =============================================================================
# 🚀 Environment & Paths
# =============================================================================
export PATH="$HOME/.opencode/bin:$PATH"

# Pyenv
export PYENV_ROOT="$HOME/.pyenv"
if [ -d "$PYENV_ROOT" ]; then
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)" 2>/dev/null
fi

# =============================================================================
# 🛠️  Config Management (Chezmoi & Dotfiles)
# =============================================================================
alias eaa="nvim $HOME/chezmoi/dot_config/aliases/a.conf"
alias eaz="nvim $HOME/chezmoi/dot_config/dotfiles/aliases/a.conf"

# 确保 dotfiles 里能访问 chezmoi 配置
[[ ! -e "$HOME/dotfiles/chezmoi" && -d "$HOME/chezmoi" ]] && ln -s "$HOME/chezmoi" "$HOME/dotfiles/chezmoi"
# 确保 chezmoi 里能访问 .config（浏览 chezmoi 生成的配置文件）
[[ ! -e "$HOME/chezmoi/config" && -d "$HOME/.config" ]] && ln -s "$HOME/.config" "$HOME/chezmoi/config"

# =============================================================================
# 🤖 OpenCode REPL
# =============================================================================
if [[ "$OSTYPE" == "darwin"* ]]; then
    _OC_BIN="$HOME/Development/oc/fork/dist/opencode-darwin-arm64/bin/opencode-minimal"
else
    _OC_BIN="$HOME/Development/oc/fork/dist/opencode-linux-x64/bin/opencode-minimal"
fi

# Aliases
alias oc="$_OC_BIN --model opencode/deepseek-v4-flash-free"
alias occ="$_OC_BIN --model opencode/deepseek-v4-flash-free --continue"
alias ocr="$_OC_BIN --model opencode/deepseek-v4-flash-free"
alias oc-build="bash $HOME/Development/oc/fork/build.sh"

# Legacy/Other Agent Refs
alias xmcline="bash $HOME/dotfiles/agents/cline/cline"
alias xmcodex="bash $HOME/dotfiles/agents/codex/codex"
alias xmopencode="bash $HOME/dotfiles/agents/opencode/opencode"

# =============================================================================
# 📡 Agent Scripts & Proxies
# =============================================================================
alias claude2kimi="bash ${HOME}/.config/agents/claude2kimi/launch.sh"
alias claude2xiaomi="bash ${HOME}/.config/agents/claude2xiaomi/launch.sh"
alias claude2deepseek="bash ${HOME}/.config/agents/claude2deepseek/launch.sh"
alias claude2ark="bash ${HOME}/.config/agents/claude2ark/launch.sh"
alias opencode2zhipu="bash ${HOME}/.config/agents/opencode2zhipu/launch.sh"

# =============================================================================
# 💡 General Utilities & Tools
# =============================================================================
alias gm="gemini"
alias zee="bash ${HOME}/dotfiles/plugins/zellij/zee"
alias pat="bash $HOME/chezmoi/dot_config/dotfiles/scripts/pat.sh"
alias fy="python $HOME/dotfiles/scripts/translate/translate.py"
alias zdy='nvim +"normal! GA" "${HOME}/dotfiles/rime/sbzr.chrome.extension/dicts/zdy.dict.yaml"'

# Functions
cx() {
  nvm use 20 && command codex
}

# =============================================================================
# 🔐 Private & Footer
# =============================================================================
# 敏感别名已迁移到 ~/.config/dotfiles/aliases/private.conf（chezmoi 加密管理）

# ⚠️  此文件由 chezmoi 管理，请勿直接编辑 ~/.config/dotfiles/aliases/a.conf
#     源文件位于: ~/chezmoi/dot_config/dotfiles/aliases/a.conf
#     修改后运行: chezmoi apply
# =============================================================================
