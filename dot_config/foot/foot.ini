[main]
include=~/.local/state/sumika-shell/theme/current/foot.ini
term=xterm-256color
font=JetBrainsMono Nerd Font:size=11
letter-spacing=0.5
pad=14x14
initial-window-mode=windowed
workers=0

[scrollback]
lines=10000

[cursor]
style=block
blink=no

[key-bindings]
clipboard-copy=Control+Insert Control+Shift+c XF86Copy
primary-paste=none
clipboard-paste=Shift+Insert Control+Shift+v XF86Paste

[text-bindings]
\x1b\x0d=Shift+Return
