# 工具脚本エイリアス
alias ytdl="bash ${HOME}/dotfiles/tools/ytdl.sh"
alias unzip:here="bash ${HOME}/dotfiles/tools/unzip_here.sh"
alias packtar="bash ${HOME}/dotfiles/tools/packtar.sh"
alias jp="bash ${HOME}/chezmoi/dot_config/dotfiles/tools/executable_jp_convert.sh"
alias rjz="trans ja:zh"
alias rzj="trans zh:ja"
alias sbzr="bash ${HOME}/chezmoi/dot_config/dotfiles/tools/executable_sbzr.sh"

# termscp: 双栏 SFTP 客户端（类似 FileZilla）
# 连接 alpine 练习容器
alias alpine-scp="termscp sftp://student@localhost:2222"

# lftp: 命令行 FTP/SFTP 客户端，支持书签、后台传输、断点续传
# 书签保存在 ~/.lftp/bookmarks
alias lftp-practice="lftp alpine-practice"

# mc (Midnight Commander): 经典双栏文件管理器
# 启动后按 F9 → Left → Shell link → SFTP → 输入 student@localhost:2222
# Ctrl+U 交换左右面板
alias mc-practice="mc"

# vifm: vim 风格双栏文件管理器
# 在 vifm 里输入 :alpine 查看连接提示
alias vifm-practice="vifm"

# ranger: 三栏文件管理器
# 在 ranger 里输入 :alpine 查看连接提示
alias ranger-practice="ranger"
