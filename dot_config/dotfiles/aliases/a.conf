export PATH="$HOME/.opencode/bin:$PATH"

alias gm="gemini"
alias zdy='nvim +"normal! GA" "${HOME}/dotfiles/rime/sbzr.chrome.extension/dicts/zdy.dict.yaml"'
alias zee="bash ${HOME}/dotfiles/plugins/zellij/zee"
alias oc="$HOME/.opencode/bin/opencode"

# script
alias ck="bash ${HOME}/.config/scripts/claude2kimi/launch.sh"
alias pat="bash $HOME/dotfiles/rime/pat.sh"

# function
# 开发环境エイリアス
export PYENV_ROOT="$HOME/.pyenv"
if [ -d "$PYENV_ROOT" ]; then
    export PATH="$PYENV_ROOT/bin:$PATH"
    eval "$(pyenv init -)" 2>/dev/null
fi

cx() {
  nvm use 20 && command codex
}

# 敏感别名已迁移到 ~/.config/dotfiles/aliases/private.conf（chezmoi 加密管理）
