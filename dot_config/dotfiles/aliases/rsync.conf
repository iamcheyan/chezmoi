# =============================================================================
# rsync.conf - rsync 备份与文件同步别名配置
#
# 路径: /Users/tetsuya/dotfiles/aliases/rsync.conf
# 作者: tetsuya
# 说明: 提供便捷的 rsync 操作别名，主要用于 iCloud Drive 备份到 NAS。
#
# 使用方法:
#   source /Users/tetsuya/dotfiles/aliases/rsync.conf
#
# 依赖条件:
#   - macOS 系统（sync_icloud 需要）
#   - 已安装 rsync
#   - NAS 已挂载到 /Volumes/NAS/Backups/iCloud（sync_icloud 需要）
#
# =============================================================================

# ─── iCloud Drive 备份 ──────────────────────────────────────────────────────
# 将 iCloud Drive 同步备份到 NAS。
# 仅限 macOS 使用。需要 NAS 已挂载。
alias sync_icloud="/Users/tetsuya/dotfiles/aliases/scripts/iCloud/icloud-backup.sh"

# ─── 通用 rsync 快捷命令 ────────────────────────────────────────────────────
# 复制文件并显示进度（归档模式、详细输出、人类可读大小）
alias sync_cp="rsync -avh --progress"

# 移动文件（先复制，完成后删除源文件）
alias sync_mv="rsync -avh --progress --remove-source-files"

# 镜像同步：使目标目录与源目录完全一致（会删除目标中多余的文件）
# ⚠️ 警告：这会删除目标目录中源目录没有的文件！
alias sync_mirror="rsync -avh --progress --delete"

