# Git ツールエイリアス
unalias gc 2>/dev/null
gc() {
  if [ -z "$1" ]; then
    echo "Usage: gc -m \"commit message\""
    return 1
  fi

  git add .

  git commit "$@"
}

dp() {
  echo "🧠 push dotfiles..."
  bash ${HOME}/dotfiles/scripts/dev/push_dotfiles.sh

  if [ -d "${HOME}/chezmoi/.git" ]; then
    echo "🔐 push chezmoi..."
    git -C "${HOME}/chezmoi" add -A
    git -C "${HOME}/chezmoi" commit -m "update" >/dev/null 2>&1 || true
    git -C "${HOME}/chezmoi" push
  fi
}
######################
alias easygit="bash ${HOME}/dotfiles/tools/easygit.sh"
alias lg="lazygit"
alias gstsh="git status --short"
alias gpat="bash $HOME/dotfiles/rime/pat.sh"
alias ga="git add -A"
alias gu="git reset HEAD"
alias gw="git stash"
alias gp="git stash pop"
alias gs="git status -s"
alias gui="gitui"
git:ui() { command gitui "$@"; }
git:delta:init() {
    if ! command -v delta >/dev/null 2>&1; then echo "delta 未安装"; return 1; fi
    git config --global core.pager delta
    git config --global interactive.diffFilter 'delta --color-only'
    git config --global delta.navigate true
    git config --global delta.side-by-side true
    echo "✓ 已启用 delta"
}
git:diff() { command git diff "$@"; }
git:init() { easygit init "$@"; }

