  
alias ze="zellij"
zea() {
  echo "🧠 zellij attach -c -f：Attach or create a new session (force full screen)"
  zellij attach -c -f "$@"
}
zem() {
  # 检查是否真的在 zellij 里（环境变量 + 进程树双重验证）
  if [[ -n "$ZELLIJ" ]]; then
    local pid=$$
    while [[ -n "$pid" && "$pid" -ne 1 ]]; do
      if ps -p "$pid" -o comm= 2>/dev/null | grep -q zellij; then
        echo "⚠️  You are already in a zellij session. Use 'Ctrl+o d' to detach first."
        return 1
      fi
      pid=$(ps -p "$pid" -o ppid= 2>/dev/null | tr -d ' ')
    done
    # 环境变量残留，清理掉
    unset ZELLIJ ZELLIJ_SESSION_NAME ZELLIJ_PANE_ID ZELLIJ_SOCKET_DIR 2>/dev/null
  fi
  zellij attach -c -f main
}
alias zec="zellij attach -c -f "
alias zetmp="zellij attach -c -f tmp options --default-layout compact"
alias zedefault="zellij -l default"
alias zecompact="zellij -l compact"
alias zeclassic="zellij -l classic"
zeclear() {
    zellij ls \
        | sed -E 's/\x1B\[[0-9;]*[[:alpha:]]//g' \
        | awk '/EXITED/ {print $1}' \
        | xargs -r -I {} zellij delete-session "{}"
}

