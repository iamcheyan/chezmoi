# y: 启动 yazi 文件管理器，退出后切换到选择的目录
# - 使用临时文件保存 yazi 退出时的当前目录
# - 退出后自动切换到该目录
# - 解决 Terminal Response Timeout 问题（通过禁用 shell hook）
y() {
  local tmp cwd
  tmp="$(mktemp -t yazi-cwd.XXXXXX)"

  if [[ $# -gt 0 ]]; then
    command yazi --cwd-file="$tmp" "$@"
  else
    command yazi --cwd-file="$tmp"
  fi

  if [ -f "$tmp" ]; then
    cwd="$(cat "$tmp")"
    [ -n "$cwd" ] && [ -d "$cwd" ] && cd "$cwd"
    rm -f "$tmp"
  fi
}
