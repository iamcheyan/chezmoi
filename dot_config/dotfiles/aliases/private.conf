# 敏感/私有别名（由 chezmoi 加密管理）
# 包含内网 IP、凭据相关的 alias 和函数

pve_win11(){
    if [ -z "$1" ]; then
      echo "Usage: pve_win11 <user:pass>"
      return 1
    fi
    local cred="$1"
    local user="${cred%%:*}"
    local pass="${cred#*:}"
    xfreerdp /v:192.168.3.65 \
      /u:"$user" /p:"$pass" \
      /drive:home,/home/tetsuya \
      /scale:180 \
      /dynamic-resolution \
      /clipboard
  }

